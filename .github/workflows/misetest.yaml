---
name: Mise Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Show installed tools
        run: |
          echo "== Installed binaries =="
          which flux
          which kubeconform
          which kustomize

          echo
          echo "== Versions =="
          flux --version
          kubeconform -v
          kustomize version