name: Automerge and Approve

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["HelmRelease test deployment"]  # Name of the main CI workflow
    types:
      - completed
      
concurrency:
  group: automerge-${{ github.event.workflow_run.pull_requests[0].number }}
  cancel-in-progress: true
  
jobs:
  automerge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.BOEMEL_ACTIONS_APP_ID }}
          private-key: ${{ secrets.BOEMEL_ACTIONS_APP_PRIVATE_KEY }}    
      - name: automerge
        uses: "pascalgn/automerge-action@7961b8b5eec56cc088c140b56d864285eabd3f67" # v0.16.4
        id: automerge
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          UPDATE_RETRIES: 24
          UPDATE_RETRY_SLEEP: 60000
          MERGE_RETRIES: 24
          MERGE_RETRY_SLEEP: 60000
          MERGE_METHOD: "squash"
