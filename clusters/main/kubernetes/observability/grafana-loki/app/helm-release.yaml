---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-loki
  namespace: grafana-loki
spec:
  interval: 15m
  chart:
    spec:
      chart: loki
      version: 6.57.0
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      analytics:
        reporting_enabled: false
      server:
        log_level: info
      commonConfig:
        replication_factor: 1
      compactor:
        working_directory: /var/loki/compactor/retention
        delete_request_store: filesystem
        retention_enabled: true
      ingester:
        chunk_encoding: snappy
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-04-01" # quote
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      limits_config:
        retention_period: 14d
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        # storageClass: longhorn
        size: 100Gi
    gateway:
      enabled: false
      replicas: 0
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    lokiCanary:
      enabled: false
    test:
      enabled: false
#    sidecar:
#      image:
#        repository: ghcr.io/kiwigrid/k8s-sidecar
#      rules:
#        searchNamespace: ALL

    ruler:
      # -- The ruler component is optional and can be disabled if desired.
      enabled: false
      # -- Whether to enable the rules sidecar
      # sidecar: true

    # sidecar:
    #   image:
    #     registry: docker.io
    #     # -- The Docker registry and image for the k8s sidecar
    #     repository: kiwigrid/k8s-sidecar
    #     # -- Docker image tag
    #     tag: 2.5.0
    #     # -- Docker image sha. If empty, no sha will be used
    #     sha: ""
    #     # -- Docker image pull policy
    #     pullPolicy: IfNotPresent
    #   # -- Resource requests and limits for the sidecar
    #   rules:
    #     # -- Whether or not to create a sidecar to ingest rule from specific ConfigMaps and/or Secrets.
    #     enabled: false