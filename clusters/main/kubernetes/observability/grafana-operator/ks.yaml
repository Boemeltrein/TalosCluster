---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-operator
  namespace: flux-system
spec:
  interval: 10m
  path: clusters/main/kubernetes/observability/grafana-operator/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: cluster
  wait: true
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-instance
  namespace: flux-system  
spec:
  dependsOn:
    - name: grafana-operator
      namespace: flux-system
  interval: 10m
  path: clusters/main/kubernetes/observability/grafana-operator/instance
  prune: true
  sourceRef:
    kind: GitRepository
    name: cluster

