apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kromgo
  namespace: kromgo
spec:
  interval: 15m
  chart:
    spec:
      chart: kromgo
      version: 3.1.5
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  
  values:
    TZ: Europe/Amsterdam
    
    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: kromgo.${DOMAIN}
        integrations:
          certManager:
            enabled: true
            certificateIssuer: cloudflare

    kromgo:
      defaults:
        badge:
          font: dejavu-sans # dejavu-sans (default, shields.io-style), dejavu-sans-bold, comic-neue, comic-neue-bold
          size: 11 # badge font size in points
          style: flat # flat (default), flat-square, or plastic
          gallery:
            hidden: false # list badges in the gallery (default); true hides them
        graph:
            maxDuration: 1h # cap on a graph's requested window ("0" = unlimited)
            width: 600 # image width in px
            height: 200 # image height in px
            legend: true # show the series legend
            theme: light # color theme — see Themes below
            font: dejavu-sans # text font — see Themes below
            gallery:
              hidden: false # list graphs in the gallery (default); true hides them
      badges:
        - id: talos_version
          query: label_replace(node_os_info{name="Talos"}, "version_id", "$1", "version_id", "v(.+)")
          title: Talos
          icon: si:talos
          valueExpr: labels["version_id"]
          colorExpr: '"blue"'          

        - id: kubernetes_version
          query: label_replace(kubernetes_build_info{service="kubernetes"}, "git_version", "$1", "git_version", "v(.+)")
          title: Kubernetes
          icon: si:kubernetes
          valueExpr: labels["git_version"]
          colorExpr: '"blue"'          

        - id: flux_version
          query: label_replace(gotk_resource_info{exported_namespace="flux-system",name="flux",customresource_kind="Kustomization"}, "revision", "$1", "revision", "v(.+)@sha256:.+")
          title: Flux
          icon: si:flux
          valueExpr: labels["revision"]
          colorExpr: '"blue"'          

        - id: truenas_version
          query: truenas_info
          title: "Truenas"
          icon: si:truenas          
          valueExpr: labels["version"]
          colorExpr: '"blue"'

        - id: cluster_node_count
          query: count(count by (node) (kube_node_status_condition{condition="Ready"}))
          colorExpr: 'result > 0 ? "green" : "red"'
          title: Nodes

        - id: cluster_pod_count
          query: sum(kube_pod_status_phase{phase="Running"})
          colorExpr: 'result > 0 ? "green" : "red"'
          title: Pods

        - id: cluster_cpu_usage
          query: round(avg(instance:node_cpu_utilisation:rate5m{pod!=""}) * 100, 0.1)
          valueExpr: string(result) + "%"
          colorExpr: 'result < 35 ? "green" : result < 75 ? "orange" : "red"'
          title: CPU

        - id: cluster_memory_usage
          query: round(sum(node_memory_MemTotal_bytes{pod!=""} - node_memory_MemAvailable_bytes{pod!=""}) / sum(node_memory_MemTotal_bytes{pod!=""}) * 100, 0.1)
          valueExpr: string(result) + "%"
          colorExpr: 'result < 35 ? "green" : result < 75 ? "orange" : "red"'
          title: Memory

        - id: cluster_power_usage
          query: round(shellyplug_power{name="server"}, 1)
          valueExpr: string(result) + "w"
          colorExpr: 'result < 110 ? "green" : result < 150 ? "orange" : "red"'
          title: Power

        - id: cluster_age_days
          query: round((time() - min(kube_node_created) ) / 86400)
          valueExpr: string(result) + "d"
          colorExpr: 'result < 180 ? "green" : result < 360 ? "orange" : "red"'
          title: Age

        - id: cluster_uptime_days
          query: round(avg(node_time_seconds{pod!=""} - node_boot_time_seconds{pod!=""}) / 86400)
          valueExpr: string(result) + "d"
          colorExpr: 'result < 180 ? "green" : result < 360 ? "orange" : "red"'
          title: Uptime

        - id: cluster_alert_count
          query: alertmanager_alerts{state="active"} - 1 # Ignore Watchdog
          colorExpr: 'result < 1 ? "green" : "red"'
          title: Alerts
