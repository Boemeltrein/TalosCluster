apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-gateway-proxy-monitoring
  namespace: envoy-gateway
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: envoy
      app.kubernetes.io/component: proxy
  namespaceSelector:
    matchNames:
      - envoy-gateway
  jobLabel: envoy-proxy
  podMetricsEndpoints:
    - path: /stats/prometheus
      interval: 15s
      port: metrics