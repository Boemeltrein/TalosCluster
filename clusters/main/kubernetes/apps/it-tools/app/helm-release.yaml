apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: it-tools
  namespace: it-tools
spec:
  interval: 5m
  chart:
    spec:
      chart: it-tools
      version: 8.17.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    TZ: Europe/Amsterdam

    global:
      stopAll: false
    
    image:
      repository: oci.trueforge.org/containerforge/it-tools
      pullPolicy: IfNotPresent
      tag: 2024.10.22@sha256:61cc5799a8990817710aca96bee4aa958640a1f58048edfd6e9241a735d58a78
    persistence:
      config:
        enabled: true
        type: emptyDir

    ingress:
      main:
        enabled: true
        ingressClassName: internal
        hosts:
          - host: it-tools.${BASE_DOMAIN}
        integrations:
          certManager:
            enabled: true
            certificateIssuer: cloudflare
