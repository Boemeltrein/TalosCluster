---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
  namespace: konflate
spec:
  interval: 15m
  chart:
    spec:
      chart: konflate
      version: 0.2.26
      sourceRef:
        kind: HelmRepository
        name: home-operations
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    config:
      repo: github://Boemeltrein/TalosCluster
      closedPrMax: 0
      closedPrTtl: 720h      
      statusChecks: true
      prComments: true
      publicUrl: https://konflate.${DOMAIN}
    secret:
      existingSecret: konflate-secret

    ingress:
      enabled: true
      className: external
      annotations:
        cert-manager.io/cluster-issuer: cloudflare
        cert-manager.io/private-key-rotation-policy: Always
        gatus.home-operations.com/endpoint: |-
          conditions: ["[STATUS] == 200"]
      hosts:
        - host: konflate.${DOMAIN}
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: konflate-tls
          hosts:
            - konflate.${DOMAIN}

    persistence:
      enabled: true

    monitoring:
      serviceMonitor:
        enabled: true

    resources:
      requests:
        cpu: 50m
      limits:
        memory: 1Gi
