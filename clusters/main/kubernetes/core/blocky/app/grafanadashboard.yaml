---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: blocky
  namespace: blocky
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: prometheus
    - inputName: VAR_BLOCKY_URL
      datasourceName: "https://blocky.${BASE_DOMAIN}"  
  grafanaCom:
    id: 13768
    revision: 7
  folder: "Networking 🌐"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: blocky-postgres
  namespace: blocky
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - inputName: DS_BLOCKY-POSTGRESQL
      datasourceName: "blockypostgres"
  grafanaCom:
    id: 17996
    revision: 15
  folder: "Networking 🌐"